name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches extension version
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "${tag_version}" != "${package_version}" ]; then
            echo "Tag version (${tag_version}) does not match package.json version (${package_version})"
            exit 1
          fi

      - name: Lint GitHub Actions workflows
        run: |
          set -euo pipefail
          bin_dir="${RUNNER_TEMP}/actionlint-bin"
          mkdir -p "${bin_dir}"
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11 "${bin_dir}"
          "${bin_dir}/actionlint"

      - name: Audit Node.js dependencies
        run: |
          set -euo pipefail
          npm audit --audit-level=high --package-lock-only

      - name: Lint extension
        run: npm run lint

      - name: Build extension
        run: npm run build

      - name: Run test suite
        run: npm run test:unit

      - name: Run e2e tests
        run: xvfb-run -a npm run test:e2e

      - name: Package VSIX
        run: npx vsce package

      - name: Resolve VSIX file
        id: vsix
        run: |
          set -euo pipefail
          file="$(ls -1 *.vsix | head -n 1)"
          if [ -z "${file}" ]; then
            echo "VSIX file not found"
            exit 1
          fi
          echo "file=${file}" >> "${GITHUB_OUTPUT}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-apps-vsix-${{ github.ref_name }}
          path: ${{ steps.vsix.outputs.file }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.file }}
          generate_release_notes: true
