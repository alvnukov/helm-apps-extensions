name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint GitHub Actions workflows
        run: |
          set -euo pipefail
          bin_dir="${RUNNER_TEMP}/actionlint-bin"
          mkdir -p "${bin_dir}"
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11 "${bin_dir}"
          "${bin_dir}/actionlint"

      - name: Review dependency changes
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Scan changed commits for leaked secrets
        uses: trufflesecurity/trufflehog@v3.93.8
        with:
          path: ./

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Audit Node.js dependencies
        run: |
          set -euo pipefail
          npm audit --audit-level=high --package-lock-only

  test:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install extension dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Build extension
        run: |
          set -euo pipefail
          npm run build

      - name: Test extension
        run: |
          set -euo pipefail
          npm test
          xvfb-run -a npm run test:e2e

  jetbrains:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build JetBrains plugin
        run: |
          set -euo pipefail
          gradle -p jetbrains test buildPlugin --no-daemon

      - name: Upload JetBrains plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-apps-jetbrains-plugin
          path: jetbrains/build/distributions/*.zip
          if-no-files-found: error
