name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install extension dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Build extension
        run: |
          set -euo pipefail
          npm run build

      - name: Test extension
        run: |
          set -euo pipefail
          npm test
          xvfb-run -a npm run test:e2e

  jetbrains:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build JetBrains plugin
        run: |
          set -euo pipefail
          gradle -p jetbrains test buildPlugin --no-daemon

      - name: Upload JetBrains plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-apps-jetbrains-plugin
          path: jetbrains/build/distributions/*.zip
          if-no-files-found: error
